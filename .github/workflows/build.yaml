name: Deploy
on:
  pull_request:
  push:
    branches:
      - master
concurrency:
  group: ${{ github.event_name == 'push' && 'push-global' || github.run_id }}
  cancel-in-progress: true

permissions:
  issues: write

jobs:
  update_http_client:
    name: Update Http Client
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        if: ${{ github.event_name == 'pull_request' }}
        with:
          fetch-depth: 0

      - name: Check http client diff
        if: ${{ github.event_name == 'pull_request' }}
        id: http_client_diff
        run: |
          set -e
          LAST_ARTIFACT_COMMIT=$(git log -n 1 --pretty=format:%H -- spectre-common/src/main/resources/http-client-linux-amd64 || true)
          echo "last_artifact_commit=$LAST_ARTIFACT_COMMIT" >> $GITHUB_OUTPUT
          if [ -z "$LAST_ARTIFACT_COMMIT" ]; then
            echo "need_build=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if git diff --quiet "$LAST_ARTIFACT_COMMIT" "${{ github.sha }}" -- cli/native-http-client; then
            echo "need_build=false" >> $GITHUB_OUTPUT
          else
            echo "need_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Build all targets
        if: ${{ steps.http_client_diff.outputs.need_build == 'true' && github.event_name == 'pull_request' }}
        run: |
          cd cli/native-http-client
          cargo install cross --locked
          cross build --release --target x86_64-unknown-linux-musl
          cross build --release --target aarch64-unknown-linux-musl

      - name: Update Http Client
        if: ${{ steps.http_client_diff.outputs.need_build == 'true' && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp cli/native-http-client/target/x86_64-unknown-linux-musl/release/native-http-client spectre-common/src/main/resources/http-client-linux-amd64
          cp cli/native-http-client/target/aarch64-unknown-linux-musl/release/native-http-client spectre-common/src/main/resources/http-client-linux-arm64

          BRANCH="${{ github.head_ref }}"

          git config user.email "action@github.com"
          git config user.name "GitHub Action"

          git fetch origin $BRANCH
          git checkout $BRANCH
          git add spectre-common/src/main/resources/http-client-linux-amd64 spectre-common/src/main/resources/http-client-linux-arm64
          git status --short
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes detected, skip commit and push."
            exit 0
          fi
          git commit -m "Update http client"
          git push origin $BRANCH

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    needs: update_http_client
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Tests
        id: test
        run: sh ./gradlew spectre-core:test

      - name: Upload Test Output
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ./spectre-core/build/reports/tests/test/**/*

      - name: Publish to Cloudflare Pages
        if: failure() && steps.test.outcome == 'failure'
        uses: cloudflare/wrangler-action@v3
        id: cloudflare
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: 'pages deploy ${{ github.workspace }}/spectre-core/build/reports/tests/test/ --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Summary
        if: failure() && steps.test.outcome == 'failure'
        run: |
          echo "# Test Report" >> $GITHUB_STEP_SUMMARY
          echo "❌ Run test failed, click [here](${{ steps.cloudflare.outputs.deployment-url }}) to check the test report." >> $GITHUB_STEP_SUMMARY
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: update_http_client
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Integration Test
        id: test
        run:
          sh ./gradlew spectre-core:integrationTest

      - name: Upload Test Output
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: ./spectre-core/build/reports/tests/integrationTest/**/*

      - name: Publish to Cloudflare Pages
        if: failure() && steps.test.outcome == 'failure'
        uses: cloudflare/wrangler-action@v3
        id: cloudflare
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: 'pages deploy ${{ github.workspace }}/spectre-core/build/reports/tests/integrationTest/ --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}'
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Summary
        if: failure() && steps.test.outcome == 'failure'
        run: |
          echo "# Test Report" >> $GITHUB_STEP_SUMMARY
          echo "❌ Run test failed, click [here](${{ steps.cloudflare.outputs.deployment-url }}) to check the test report." >> $GITHUB_STEP_SUMMARY


  build:
    runs-on: ubuntu-latest
    needs:
      - test
      - integration-test
    name: Build Project
    outputs:
      app_version: ${{ steps.env.outputs.APP_VERSION }}
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Environment
        id: env
        run: |
          APP_VERSION=`cat gradle.properties | grep spectreVersion | cut -d'=' -f2 | tr -d ' '`
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_OUTPUT

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'pnpm'
          cache-dependency-path: spectre-frontend/pnpm-lock.yaml

      - name: Build Frontend
        working-directory: spectre-frontend
        env:
          VITE_IS_PREVIEW_ENV: true
          VITE_APP_VERSION: ${{ steps.env.outputs.APP_VERSION }}-${{ github.sha }}
        run: pnpm i && pnpm run build

      - name: Build Backend
        run: >
          mkdir spectre-core/src/main/resources/static/  &&
          cp -r spectre-frontend/dist/* spectre-core/src/main/resources/static/ &&
          sh ./gradlew build -x test

      - name: Upload Spectre
        uses: actions/upload-artifact@v4
        with:
          name: 'spectre'
          path: spectre-core/build/libs/spectre-core-${{ steps.env.outputs.APP_VERSION }}.jar
  upload:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    name: Upload Image
    needs: build
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v4

      - name: Enable QEMU
        uses: docker/setup-qemu-action@v3

      # Step 2: 安装 buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/download-artifact@v4
        with:
          name: spectre
          path: deploy/image

      - name: Rename Package
        run: mv deploy/image/spectre-core-${{ needs.build.outputs.app_version }}.jar deploy/image/spectre.jar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Build And Push Image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file deploy/image/Dockerfile \
            --push \
            -t public.ecr.aws/b9z8l9n7/vudsen/spectre:${{ needs.build.outputs.app_version }}-${{ github.sha }} \
            deploy/image

      - name: Restart Service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: sudo sh /opt/spectre/reboot.sh ${{ needs.build.outputs.app_version }}-${{ github.sha }}
